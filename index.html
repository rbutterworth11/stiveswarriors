<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St Ives Warriors — Darts Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--bg2:#12151c;--bg3:#1a1e28;--bg4:#0e1018;--bd:rgba(255,255,255,.06);--bdf:rgba(212,175,55,.5);--t:#e8e6e3;--td:#7a8194;--tf:#3d4455;--gold:#d4af37;--goldb:#f0d060;--red:#d94f4f;--grn:#4ade80;--blu:#60a5fa;--ora:#f59e0b;--wr:#c41e3a;--wrd:#8b1528;--r:10px;--rs:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Serif 4',serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(196,30,58,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(212,175,55,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:12px}
.hdr{text-align:center;padding:28px 16px 20px}.hdr-badge{display:inline-flex;align-items:center;gap:8px;background:var(--wr);padding:6px 18px;border-radius:30px;margin-bottom:10px}.hdr-badge span{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.9)}
.hdr h1{font-family:'Oswald',sans-serif;font-size:clamp(2.2rem,7vw,3.6rem);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t);line-height:1}.hdr .sub{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--td);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.hdr .pb{display:inline-block;margin-top:12px;background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:5px 16px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--td)}.hdr .pb strong{color:var(--gold)}
.nav{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r);padding:3px;margin:14px 0 20px;border:1px solid var(--bd);overflow-x:auto}.nav button{flex:1;min-width:max-content;padding:9px 14px;background:0;border:0;border-radius:calc(var(--r) - 2px);font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--td);cursor:pointer;transition:all .2s;white-space:nowrap}.nav button:hover{color:var(--t);background:var(--bg3)}.nav button.active{color:#fff;background:var(--wr)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ct{font-family:'Oswald',sans-serif;font-size:1.15rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}.ct .i{font-size:1rem}
.tw{overflow-x:auto;margin:0 -18px;padding:0 18px}table{width:100%;border-collapse:collapse;font-size:.8rem}
th{font-family:'IBM Plex Mono',monospace;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--td);text-align:left;padding:7px 8px;border-bottom:2px solid var(--tf);white-space:nowrap}
td{padding:8px;border-bottom:1px solid var(--bd);white-space:nowrap}th.c,td.c{text-align:center}tr:hover td{background:rgba(255,255,255,.015)}tr.hw td{background:rgba(196,30,58,.06)}
.pc{font-family:'Oswald',sans-serif;font-size:1.05rem;color:var(--td);width:28px}.p1{color:var(--gold)}.p2{color:#c0c0c0}.p3{color:#cd7f32}
.tn{font-weight:700}.tn.hl{color:var(--wr)}.sg{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--gold)}.sw{color:var(--grn)}.sl{color:var(--red)}
.fd{display:inline-block;width:20px;height:20px;border-radius:4px;font-family:'Oswald',sans-serif;font-size:.65rem;font-weight:600;line-height:20px;text-align:center;color:#fff;margin-right:2px}.fw{background:var(--grn);color:#000}.fl{background:var(--red)}
.stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px}.stb{background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center}.stb .v{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;color:var(--gold)}.stb .l{font-family:'IBM Plex Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--td);margin-top:1px}
.fc{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}.fc .hm{text-align:right;font-weight:700;font-size:.9rem}.fc .aw{text-align:left;font-weight:700;font-size:.9rem}.fc .sc{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:var(--gold);text-align:center;min-width:50px}.fc .dl{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--td);text-transform:uppercase;letter-spacing:1px}.fc.wf{border-left:3px solid var(--wr)}
.nm{background:linear-gradient(135deg,var(--wrd) 0%,var(--wr) 100%);border-radius:var(--r);padding:18px;margin-bottom:14px;text-align:center;border:1px solid rgba(255,255,255,.08)}.nm .lb{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.6);margin-bottom:6px}.nm .tm{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;text-transform:uppercase}.nm .dt{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.5);margin-top:4px}
.ph{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}.av{width:56px;height:56px;border-radius:50%;background:var(--wr);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;flex-shrink:0}
.pn{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sub-t{display:flex;gap:16px;margin-bottom:14px;border-bottom:1px solid var(--tf);padding-bottom:8px;overflow-x:auto}.sub-t button{background:0;border:0;font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);cursor:pointer;padding-bottom:4px;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}.sub-t button:hover{color:var(--t)}.sub-t button.act{color:var(--gold);border-bottom-color:var(--gold)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:0;border-radius:var(--rs);font-family:'Oswald',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.bo{background:0;border:1px solid var(--tf);color:var(--t)}.bo:hover{border-color:var(--td);background:var(--bg3)}.bs{padding:5px 12px;font-size:.7rem}
.fr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.85rem}.fr:last-child{border-bottom:0}.fa{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ora)}
.dv{height:1px;background:var(--bd);margin:14px 0}.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.pg{animation:fu .3s ease}@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ck{cursor:pointer;transition:color .2s}.ck:hover{color:var(--gold)}
.tt{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--bg2);border:1px solid var(--gold);color:var(--t);padding:10px 22px;border-radius:var(--r);font-size:.8rem;z-index:100;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none}.tt.sh{transform:translateX(-50%) translateY(0)}
.bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}.bar-f{height:100%;border-radius:3px;background:var(--grn)}
@media(max-width:600px){.app{padding:6px}.card{padding:12px}table{font-size:.7rem}th,td{padding:5px 6px}.stg{grid-template-columns:repeat(2,1fr)}.fc{gap:6px;padding:10px}}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-badge"><span>⚔️ Wimborne & District · C Section</span></div>
  <h1>St Ives Warriors</h1>
  <div class="sub">Season 2025/26</div>
  <div class="pb">Currently <strong>5th</strong> · P17 · <span style="color:var(--grn)">5W</span> <span style="color:var(--red)">12L</span> · 91 legs for</div>
</div>
<nav class="nav" id="nav"></nav>
<div id="pg"></div>
</div>
<div class="tt" id="tt"></div>
<script>
const TABS=['league','squad','results','kitty'];
const TNAME={league:'League',squad:'Squad',results:'Results',kitty:'Kitty'};
let pg='league',sp=null,st='overview';
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const toast=m=>{const t=$('#tt');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2500)};

const LT=[
{r:1,t:'Gypsy Drillers',p:17,w:14,l:3,f:118,pc:.824,fm:['L','W','W','W','W']},
{r:2,t:'Green Man A',p:16,w:12,l:4,f:103,pc:.75,fm:['W','W','W','W','L']},
{r:3,t:'Coach & Horses',p:17,w:12,l:5,f:100,pc:.706,fm:['W','W','W','W','L']},
{r:4,t:'One Over One In',p:17,w:10,l:7,f:96,pc:.588,fm:['L','W','W','W','W']},
{r:5,t:'St Ives Warriors',p:17,w:5,l:12,f:91,pc:.294,fm:['L','L','L','L','L']},
{r:6,t:'Horns C',p:16,w:9,l:7,f:87,pc:.562,fm:['L','W','W','W','W']},
{r:7,t:'CSSC B',p:17,w:7,l:10,f:86,pc:.412,fm:['L','L','W','L','L']},
{r:8,t:'Owls Nest B',p:17,w:5,l:12,f:85,pc:.294,fm:['W','L','L','L','L']},
{r:9,t:'Dorset Soldier A',p:17,w:8,l:9,f:81,pc:.471,fm:['W','L','L','L','W']},
{r:10,t:'Wimborne RBL A',p:17,w:2,l:15,f:77,pc:.118,fm:['L','W','L','L','W']}];

// FULL SEASON STATS — 19 weeks (12 spreadsheet + 7 handwritten)
const SQ=[
{n:'Adi',full:'Adi Butterworth',tw:1,tl:9,tg:10,dw:14,dl:8,dg:22,sw:10,sl:11,sg:21,ho:155,lo:7,s1:32,s14:7,s18:0,lp:85,lw:43},
{n:'Paul G',full:'Paul Greenwood',tw:5,tl:6,tg:11,dw:2,dl:14,dg:16,sw:18,sl:6,sg:24,ho:80,lo:null,s1:30,s14:7,s18:0,lp:83,lw:43},
{n:'Dave H',full:'Dave Hobbs',tw:8,tl:5,tg:13,dw:8,dl:6,dg:14,sw:10,sl:10,sg:20,ho:94,lo:5,s1:20,s14:2,s18:0,lp:79,lw:43},
{n:'Callum',full:'Callum Moran',tw:6,tl:6,tg:11,dw:10,dl:13,dg:23,sw:9,sl:9,sg:18,ho:78,lo:null,s1:23,s14:6,s18:0,lp:83,lw:40},
{n:'Paul A',full:'Paul Andrews',tw:4,tl:2,tg:5,dw:8,dl:8,dg:16,sw:10,sl:7,sg:17,ho:null,lo:null,s1:19,s14:4,s18:0,lp:62,lw:36},
{n:'Simon',full:'Simon Riches',tw:6,tl:5,tg:11,dw:6,dl:7,dg:13,sw:9,sl:8,sg:17,ho:40,lo:null,s1:12,s14:0,s18:0,lp:69,lw:35},
{n:'Dan',full:'Dan Hope',tw:7,tl:4,tg:11,dw:8,dl:7,dg:13,sw:6,sl:10,sg:16,ho:83,lo:null,s1:18,s14:5,s18:0,lp:64,lw:33},
{n:'Steve S',full:'Steve Stewart',tw:4,tl:3,tg:7,dw:8,dl:6,dg:14,sw:11,sl:9,sg:20,ho:90,lo:7,s1:21,s14:1,s18:0,lp:63,lw:37},
{n:'Ryan B',full:'Ryan Butterworth',tw:6,tl:5,tg:11,dw:7,dl:12,dg:19,sw:0,sl:3,sg:3,ho:41,lo:9,s1:11,s14:3,s18:0,lp:55,lw:21},
{n:'Dave S',full:'David Slater',tw:0,tl:1,tg:1,dw:0,dl:1,dg:1,sw:0,sl:2,sg:2,ho:4,lo:null,s1:1,s14:0,s18:0,lp:6,lw:1}];

const FX=[
{d:'01 Sep',opp:'CSSC B',v:'H',sc:'5-6',w:false},
{d:'08 Sep',opp:'Green Man A',v:'H',sc:'5-6',w:false},
{d:'22 Sep',opp:'Gypsy Drillers',v:'A',sc:'8-3',w:false},
{d:'06 Oct',opp:'Crusaders',v:'H',sc:'7-8',w:false,cup:true},
{d:'13 Oct',opp:'Wimborne RBL A',v:'A',sc:'3-8',w:true},
{d:'20 Oct',opp:'Coach & Horses',v:'H',sc:'7-4',w:true},
{d:'10 Nov',opp:'Horns C',v:'A',sc:'4-7',w:true},
{d:'17 Nov',opp:'One Over One In',v:'H',sc:'5-6',w:false},
{d:'24 Nov',opp:'Owls Nest B',v:'H',sc:'6-5',w:true},
{d:'01 Dec',opp:'Dorset Soldier A',v:'A',sc:'6-5',w:false},
{d:'08 Dec',opp:'CSSC B',v:'A',sc:'4-7',w:true},
{d:'05 Jan',opp:'Green Man A',v:'A',sc:'8-3',w:false},
{d:'12 Jan',opp:'Gypsy Drillers',v:'H',sc:'5-6',w:false},
{d:'02 Feb',opp:'Owls Nest B',v:'A',sc:'6-5',w:false},
{d:'09 Feb',opp:'Wimborne RBL A',v:'H',sc:'5-6',w:false},
{d:'23 Feb',opp:'Coach & Horses',v:'A',sc:'6-5',w:false},
{d:'02 Mar',opp:'Horns C',v:'H',sc:'5-6',w:false},
{d:'16 Mar',opp:'One Over One In',v:'A',sc:'6-5',w:false}];

const NXT={d:'23 Mar 2026',opp:'Dorset Soldier A',v:'H'};

function rNav(){$('#nav').innerHTML=TABS.map(t=>`<button class="${pg===t?'active':''}" data-p="${t}">${TNAME[t]}</button>`).join('');$$('#nav button').forEach(b=>b.onclick=()=>{pg=b.dataset.p;sp=null;st='overview';rNav();R()})}
function R(){const c=$('#pg');switch(pg){case'league':c.innerHTML=rL();break;case'squad':c.innerHTML=sp?rP():rS();break;case'results':c.innerHTML=rR();break;case'kitty':c.innerHTML=rK();break}bind()}

function rL(){
const rows=LT.map((t,i)=>{const w=t.t==='St Ives Warriors';return`<tr class="${w?'hw':''}"><td class="pc ${i<3?'p'+(i+1):''}">${t.r}</td><td><span class="tn ${w?'hl':''}">${t.t}</span></td><td class="c">${t.p}</td><td class="c sw">${t.w}</td><td class="c sl">${t.l}</td><td class="c">${t.f}</td><td class="c">${(t.pc*100).toFixed(0)}%</td><td class="c">${t.fm.map(f=>`<span class="fd f${f.toLowerCase()}">${f}</span>`).join('')}</td></tr>`}).join('');
return`<div class="pg">
<div class="nm"><div class="lb">Next Match</div><div class="tm">Warriors vs ${NXT.opp}</div><div class="dt">${NXT.d} · 8:00 PM · ${NXT.v==='H'?'Home':'Away'}</div></div>
<div class="card"><div class="ct"><span class="i">🏆</span>C Section Standings</div><div class="tw"><table><thead><tr><th>#</th><th>Team</th><th class="c">P</th><th class="c">W</th><th class="c">L</th><th class="c">For</th><th class="c">Win%</th><th class="c">Form</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`}

function rS(){
const sorted=[...SQ].sort((a,b)=>b.lw-a.lw);
const tLW=SQ.reduce((s,p)=>s+p.lw,0),tLP=SQ.reduce((s,p)=>s+p.lp,0);
const tabs=`<div class="sub-t">${['overview','triples','doubles','singles','scoring'].map(t=>`<button class="${st===t?'act':''}" data-st="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}</div>`;
let tbl='';
if(st==='overview'){
tbl=sorted.map((p,i)=>{const wp=p.lp?(p.lw/p.lp*100).toFixed(0):0;return`<tr><td class="pc ${i<3?'p'+(i+1):''}">${i+1}</td><td><span class="ck" data-pl="${p.n}">${p.full}</span></td><td class="c">${p.lp}</td><td class="c sg">${p.lw}</td><td class="c">${wp}%</td><td class="c">${p.ho||'—'}</td></tr>`}).join('');
tbl=`<table><thead><tr><th>#</th><th>Player</th><th class="c">Legs P</th><th class="c">Legs W</th><th class="c">Win%</th><th class="c">Best CO</th></tr></thead><tbody>${tbl}</tbody></table>`;
}else if(st==='triples'){
const s=[...SQ].filter(p=>p.tg).sort((a,b)=>(b.tg?b.tw/b.tg:0)-(a.tg?a.tw/a.tg:0));
tbl=`<table><thead><tr><th>Player</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.n}">${p.full}</span></td><td class="c sw">${p.tw}</td><td class="c sl">${p.tl}</td><td class="c">${p.tg}</td><td class="c">${(p.tw/p.tg*100).toFixed(0)}%</td></tr>`).join('')}</tbody></table>`;
}else if(st==='doubles'){
const s=[...SQ].filter(p=>p.dg).sort((a,b)=>(b.dg?b.dw/b.dg:0)-(a.dg?a.dw/a.dg:0));
tbl=`<table><thead><tr><th>Player</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.n}">${p.full}</span></td><td class="c sw">${p.dw}</td><td class="c sl">${p.dl}</td><td class="c">${p.dg}</td><td class="c">${(p.dw/p.dg*100).toFixed(0)}%</td></tr>`).join('')}</tbody></table>`;
}else if(st==='singles'){
const s=[...SQ].filter(p=>p.sg).sort((a,b)=>b.sw-a.sw);
tbl=`<table><thead><tr><th>Player</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.n}">${p.full}</span></td><td class="c sw">${p.sw}</td><td class="c sl">${p.sl}</td><td class="c">${p.sg}</td><td class="c">${(p.sw/p.sg*100).toFixed(0)}%</td></tr>`).join('')}</tbody></table>`;
}else{
const s=[...SQ].sort((a,b)=>b.s1-a.s1);
tbl=`<table><thead><tr><th>Player</th><th class="c">100+</th><th class="c">140+</th><th class="c">180</th><th class="c">Best CO</th><th class="c">Worst</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.n}">${p.full}</span></td><td class="c">${p.s1}</td><td class="c" style="color:var(--ora)">${p.s14}</td><td class="c" style="color:var(--red)">${p.s18||'—'}</td><td class="c">${p.ho||'—'}</td><td class="c" style="color:var(--tf)">${p.lo||'—'}</td></tr>`).join('')}</tbody></table>`}
return`<div class="pg"><div class="card"><div class="ct"><span class="i">⚔️</span>Warriors Squad — Full Season</div>
<div class="stg"><div class="stb"><div class="v">${SQ.length}</div><div class="l">Players</div></div><div class="stb"><div class="v">${tLW}</div><div class="l">Legs Won</div></div><div class="stb"><div class="v">${tLP}</div><div class="l">Legs Played</div></div><div class="stb"><div class="v">${(tLW/tLP*100).toFixed(0)}%</div><div class="l">Win Rate</div></div></div>
${tabs}<div class="tw">${tbl}</div>
<p style="font-size:.7rem;color:var(--tf);margin-top:10px">Full season: 19 match weeks (Sep 2025 – Mar 2026)</p>
</div></div>`}

function rP(){
const p=SQ.find(x=>x.n===sp);if(!p)return'<div class="pg"><p>Not found</p></div>';
const init=p.full.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const all=[...SQ].sort((a,b)=>b.lw-a.lw);const rank=all.findIndex(x=>x.n===p.n)+1;
const tW=p.tw+p.dw+p.sw,tG=p.tg+p.dg+p.sg,wp=p.lp?(p.lw/p.lp*100).toFixed(0):0;
return`<div class="pg">
<button class="btn bo bs" id="bk" style="margin-bottom:12px">← Squad</button>
<div class="card"><div class="ph"><div class="av">${init}</div><div><div class="pn">${p.full}</div><div style="color:var(--td);font-size:.8rem">Squad Rank #${rank} · St Ives Warriors</div></div></div>
<div class="stg">
<div class="stb"><div class="v">${p.lw}</div><div class="l">Legs Won</div></div>
<div class="stb"><div class="v">${wp}%</div><div class="l">Win Rate</div></div>
<div class="stb"><div class="v">${p.ho||'—'}</div><div class="l">Best CO</div></div>
<div class="stb"><div class="v">${p.s1}</div><div class="l">100+</div></div>
<div class="stb"><div class="v">${p.s14}</div><div class="l">140+</div></div>
<div class="stb"><div class="v">${p.lp}</div><div class="l">Legs Played</div></div></div>
<div class="ct" style="margin-top:8px"><span class="i">📊</span>Format Breakdown</div>
<div class="tw"><table><thead><tr><th>Format</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th><th></th></tr></thead><tbody>
<tr><td>Triples</td><td class="c sw">${p.tw}</td><td class="c sl">${p.tl}</td><td class="c">${p.tg}</td><td class="c">${p.tg?(p.tw/p.tg*100).toFixed(0)+'%':'—'}</td><td><div class="bar" style="width:80px"><div class="bar-f" style="width:${p.tg?(p.tw/p.tg*100):0}%"></div></div></td></tr>
<tr><td>Doubles</td><td class="c sw">${p.dw}</td><td class="c sl">${p.dl}</td><td class="c">${p.dg}</td><td class="c">${p.dg?(p.dw/p.dg*100).toFixed(0)+'%':'—'}</td><td><div class="bar" style="width:80px"><div class="bar-f" style="width:${p.dg?(p.dw/p.dg*100):0}%"></div></div></td></tr>
<tr><td>Singles</td><td class="c sw">${p.sw}</td><td class="c sl">${p.sl}</td><td class="c">${p.sg}</td><td class="c">${p.sg?(p.sw/p.sg*100).toFixed(0)+'%':'—'}</td><td><div class="bar" style="width:80px"><div class="bar-f" style="width:${p.sg?(p.sw/p.sg*100):0}%"></div></div></td></tr>
<tr style="border-top:2px solid var(--tf)"><td style="font-weight:700">Total</td><td class="c sw" style="font-weight:700">${tW}</td><td class="c sl" style="font-weight:700">${tG-tW}</td><td class="c" style="font-weight:700">${tG}</td><td class="c sg">${tG?(tW/tG*100).toFixed(0)+'%':'—'}</td><td></td></tr>
</tbody></table></div></div></div>`}

function rR(){
const wins=FX.filter(f=>f.w).length;
const rows=FX.slice().reverse().map(f=>{
const hm=f.v==='H'?'St Ives Warriors':f.opp;const aw=f.v==='A'?'St Ives Warriors':f.opp;
const pts=f.sc.split('-');const hw=parseInt(pts[0])>parseInt(pts[1]);
return`<div class="fc wf"><div class="hm" style="${hw?'color:var(--grn)':''}">${hm}</div><div><div class="sc">${f.sc}</div><div class="dl">${f.d}${f.cup?' · Cup':''}</div></div><div class="aw" style="${!hw?'color:var(--grn)':''}">${aw}</div></div>`}).join('');
return`<div class="pg"><div class="card"><div class="ct"><span class="i">📋</span>All Results</div>
<div class="stg" style="margin-bottom:14px"><div class="stb"><div class="v">${FX.length}</div><div class="l">Played</div></div><div class="stb"><div class="v" style="color:var(--grn)">${wins}</div><div class="l">Wins</div></div><div class="stb"><div class="v" style="color:var(--red)">${FX.length-wins}</div><div class="l">Losses</div></div></div>
${rows}</div>
<div class="card"><div class="ct"><span class="i">📅</span>Next Up</div>
<div class="fc wf"><div class="hm">St Ives Warriors</div><div><div class="sc">VS</div><div class="dl">${NXT.d}</div></div><div class="aw">${NXT.opp}</div></div></div></div>`}

function rK(){
const K=JSON.parse(localStorage.getItem('siw_kitty')||'{"subs":0,"fines":0,"payouts":0,"log":[]}');
const bal=(K.subs+K.fines-K.payouts);
return`<div class="pg">
<div class="card" style="text-align:center">
<div class="ct" style="justify-content:center"><span class="i">💰</span>Team Kitty</div>
<div style="font-family:'Oswald',sans-serif;font-size:3.5rem;font-weight:700;color:var(--gold);line-height:1">£${bal.toFixed(2)}</div>
<p style="color:var(--td);font-size:.75rem;margin-top:4px;font-family:'IBM Plex Mono',monospace">CURRENT BALANCE</p>
<div class="stg" style="margin-top:16px">
<div class="stb"><div class="v" style="color:var(--grn)">£${K.subs.toFixed(2)}</div><div class="l">Subs In</div></div>
<div class="stb"><div class="v" style="color:var(--ora)">£${K.fines.toFixed(2)}</div><div class="l">Fines In</div></div>
<div class="stb"><div class="v" style="color:var(--red)">£${K.payouts.toFixed(2)}</div><div class="l">Payouts Out</div></div>
</div></div>
<div class="card"><div class="ct"><span class="i">➕</span>Add Transaction</div>
<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
<button class="btn bo bs kt-type active" data-kt="subs" style="flex:1">Subs</button>
<button class="btn bo bs kt-type" data-kt="fines" style="flex:1">Fines</button>
<button class="btn bo bs kt-type" data-kt="payouts" style="flex:1">Payouts</button>
</div>
<div style="display:flex;gap:8px;align-items:end">
<div style="flex:1"><label style="display:block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:4px">Amount (£)</label>
<input type="number" id="ktAmt" step="0.05" min="0" value="16.00" style="width:100%;background:var(--bg4);border:1px solid var(--tf);border-radius:var(--rs);padding:8px 12px;color:var(--t);font-family:'Source Serif 4',serif;font-size:.85rem"></div>
<div style="flex:2"><label style="display:block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:4px">Note</label>
<input type="text" id="ktNote" placeholder="e.g. Week 19 subs (8 players)" style="width:100%;background:var(--bg4);border:1px solid var(--tf);border-radius:var(--rs);padding:8px 12px;color:var(--t);font-family:'Source Serif 4',serif;font-size:.85rem"></div>
<button class="btn bo bs" id="ktAdd" style="padding:8px 16px">Add</button>
</div></div>
<div class="card"><div class="ct"><span class="i">📜</span>Transaction Log</div>
${K.log.length?K.log.slice().reverse().map(e=>{
const col=e.type==='subs'?'var(--grn)':e.type==='fines'?'var(--ora)':'var(--red)';
const sign=e.type==='payouts'?'-':'+';
return`<div class="fr"><div><span style="color:${col};font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase">${e.type}</span> <span style="color:var(--td);font-size:.8rem">${e.note||''}</span><br><span style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--tf)">${e.date}</span></div><span style="color:${col};font-family:'IBM Plex Mono',monospace;font-weight:600">${sign}£${e.amount.toFixed(2)}</span></div>`}).join(''):'<p style="color:var(--td);font-size:.85rem">No transactions yet. Add your first subs entry above.</p>'}
</div></div>`}

function bindKitty(){
let ktype='subs';
$$('.kt-type').forEach(b=>{b.onclick=()=>{ktype=b.dataset.kt;$$('.kt-type').forEach(x=>x.classList.remove('active'));b.classList.add('active');
if(ktype==='subs')$('#ktAmt').value='16.00';else if(ktype==='fines')$('#ktAmt').value='1.00';else $('#ktAmt').value='3.00'}});
const addBtn=$('#ktAdd');
if(addBtn)addBtn.onclick=()=>{
const amt=parseFloat($('#ktAmt').value)||0;
const note=$('#ktNote').value.trim();
if(!amt){toast('Enter an amount');return}
const K=JSON.parse(localStorage.getItem('siw_kitty')||'{"subs":0,"fines":0,"payouts":0,"log":[]}');
K[ktype]+=amt;
K.log.push({type:ktype,amount:amt,note:note,date:new Date().toLocaleDateString('en-GB')});
localStorage.setItem('siw_kitty',JSON.stringify(K));
toast(`£${amt.toFixed(2)} ${ktype} added`);R()}}

function bind(){
$$('.ck[data-pl]').forEach(e=>e.onclick=()=>{sp=e.dataset.pl;R()});
const bk=$('#bk');if(bk)bk.onclick=()=>{sp=null;R()};
$$('.sub-t button').forEach(b=>b.onclick=()=>{st=b.dataset.st;R()});
if(pg==='kitty')bindKitty()}

rNav();R();
</script>
</body>
</html>
