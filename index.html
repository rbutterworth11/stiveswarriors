<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St Ives Warriors — Darts Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0c10;--bg2:#12151c;--bg3:#1a1e28;--bg4:#0e1018;--bd:rgba(255,255,255,.06);--bdf:rgba(212,175,55,.5);--t:#e8e6e3;--td:#7a8194;--tf:#3d4455;--gold:#d4af37;--goldb:#f0d060;--red:#d94f4f;--grn:#4ade80;--blu:#60a5fa;--ora:#f59e0b;--wr:#c41e3a;--wrd:#8b1528;--r:10px;--rs:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Serif 4',serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(196,30,58,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(212,175,55,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:12px}
.hdr{text-align:center;padding:28px 16px 20px}.hdr-badge{display:inline-flex;align-items:center;gap:8px;background:var(--wr);padding:6px 18px;border-radius:30px;margin-bottom:10px}.hdr-badge span{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.9)}
.hdr h1{font-family:'Oswald',sans-serif;font-size:clamp(2.2rem,7vw,3.6rem);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t);line-height:1}.hdr .sub{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--td);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.hdr .pb{display:inline-block;margin-top:12px;background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:5px 16px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--td)}.hdr .pb strong{color:var(--gold)}
.nav{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r);padding:3px;margin:14px 0 20px;border:1px solid var(--bd);overflow-x:auto}.nav button{flex:1;min-width:max-content;padding:9px 14px;background:0;border:0;border-radius:calc(var(--r) - 2px);font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--td);cursor:pointer;transition:all .2s;white-space:nowrap}.nav button:hover{color:var(--t);background:var(--bg3)}.nav button.active{color:#fff;background:var(--wr)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ct{font-family:'Oswald',sans-serif;font-size:1.15rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}.ct .i{font-size:1rem}
.tw{overflow-x:auto;margin:0 -18px;padding:0 18px}table{width:100%;border-collapse:collapse;font-size:.8rem}
th{font-family:'IBM Plex Mono',monospace;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--td);text-align:left;padding:7px 8px;border-bottom:2px solid var(--tf);white-space:nowrap}
td{padding:8px;border-bottom:1px solid var(--bd);white-space:nowrap}th.c,td.c{text-align:center}tr:hover td{background:rgba(255,255,255,.015)}tr.hw td{background:rgba(196,30,58,.06)}
.pc{font-family:'Oswald',sans-serif;font-size:1.05rem;color:var(--td);width:28px}.p1{color:var(--gold)}.p2{color:#c0c0c0}.p3{color:#cd7f32}
.tn{font-weight:700}.tn.hl{color:var(--wr)}.sg{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--gold)}.sw{color:var(--grn)}.sl{color:var(--red)}
.fd{display:inline-block;width:20px;height:20px;border-radius:4px;font-family:'Oswald',sans-serif;font-size:.65rem;font-weight:600;line-height:20px;text-align:center;color:#fff;margin-right:2px}.fw{background:var(--grn);color:#000}.fl{background:var(--red)}
.stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px}.stb{background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center}.stb .v{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;color:var(--gold)}.stb .l{font-family:'IBM Plex Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--td);margin-top:1px}
.fc{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}.fc .hm{text-align:right;font-weight:700;font-size:.9rem}.fc .aw{text-align:left;font-weight:700;font-size:.9rem}.fc .sc{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:var(--gold);text-align:center;min-width:50px}.fc .dl{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--td);text-transform:uppercase;letter-spacing:1px}.fc.wf{border-left:3px solid var(--wr)}
.nm{background:linear-gradient(135deg,var(--wrd) 0%,var(--wr) 100%);border-radius:var(--r);padding:18px;margin-bottom:14px;text-align:center;border:1px solid rgba(255,255,255,.08)}.nm .lb{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.6);margin-bottom:6px}.nm .tm{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;text-transform:uppercase}.nm .dt{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.5);margin-top:4px}
.ph{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}.av{width:56px;height:56px;border-radius:50%;background:var(--wr);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;flex-shrink:0}
.pn{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sub-t{display:flex;gap:16px;margin-bottom:14px;border-bottom:1px solid var(--tf);padding-bottom:8px;overflow-x:auto}.sub-t button{background:0;border:0;font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);cursor:pointer;padding-bottom:4px;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}.sub-t button:hover{color:var(--t)}.sub-t button.act{color:var(--gold);border-bottom-color:var(--gold)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:0;border-radius:var(--rs);font-family:'Oswald',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.br{background:var(--wr);color:#fff}.br:hover{background:#d6223f;transform:translateY(-1px)}.br:disabled{opacity:.4;cursor:not-allowed;transform:none}
.bg{background:var(--gold);color:#000}.bg:hover{background:var(--goldb);transform:translateY(-1px)}.bg:disabled{opacity:.4;cursor:not-allowed;transform:none}
.bo{background:0;border:1px solid var(--tf);color:var(--t)}.bo:hover{border-color:var(--td);background:var(--bg3)}.bs{padding:5px 12px;font-size:.7rem}
.fg{margin-bottom:14px}.fg label{display:block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg4);border:1px solid var(--tf);border-radius:var(--rs);padding:8px 12px;color:var(--t);font-family:'Source Serif 4',serif;font-size:.85rem}.fg input:focus,.fg select:focus,.fg textarea:focus{outline:0;border-color:var(--bdf)}
select option{background:var(--bg2)}
.fr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.85rem}.fr:last-child{border-bottom:0}.fa{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ora)}
.dv{height:1px;background:var(--bd);margin:14px 0}
.pg{animation:fu .3s ease}@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ck{cursor:pointer;transition:color .2s}.ck:hover{color:var(--gold)}
.tt{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--bg2);border:1px solid var(--gold);color:var(--t);padding:10px 22px;border-radius:var(--r);font-size:.8rem;z-index:100;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none}.tt.sh{transform:translateX(-50%) translateY(0)}
.bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}.bar-f{height:100%;border-radius:3px;background:var(--grn)}
.sts{padding:10px 14px;border-radius:var(--rs);font-size:.8rem;margin-bottom:14px;display:flex;align-items:center;gap:6px}.sts.ok{background:rgba(74,222,128,.08);border:1px solid var(--grn);color:var(--grn)}.sts.err{background:rgba(217,79,79,.08);border:1px solid var(--red);color:var(--red)}.sts.inf{background:rgba(96,165,250,.08);border:1px solid var(--blu);color:var(--blu)}
.spn{display:inline-block;width:18px;height:18px;border:2px solid var(--tf);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.player-row{display:grid;grid-template-columns:120px repeat(9,1fr) 60px 60px 50px 50px;gap:4px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.75rem}
.player-row.hdr-row{font-family:'IBM Plex Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);border-bottom:2px solid var(--tf)}
.player-row input{width:100%;background:var(--bg4);border:1px solid var(--tf);border-radius:4px;padding:4px 6px;color:var(--t);font-family:'IBM Plex Mono',monospace;font-size:.75rem;text-align:center}
.player-row input:focus{outline:0;border-color:var(--bdf)}
.player-row .pname{font-weight:600;font-size:.8rem}
@media(max-width:768px){.player-row{grid-template-columns:90px repeat(9,1fr) 50px 50px 40px 40px;font-size:.65rem}.player-row input{padding:3px 2px;font-size:.65rem}}
@media(max-width:600px){.app{padding:6px}.card{padding:12px}table{font-size:.7rem}th,td{padding:5px 6px}.stg{grid-template-columns:repeat(2,1fr)}.fc{gap:6px;padding:10px}}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-badge"><span>⚔️ Wimborne & District · C Section</span></div>
  <h1>St Ives Warriors</h1>
  <div class="sub">Season 2025/26</div>
  <div class="pb" id="hdrSummary">Loading...</div>
</div>
<nav class="nav" id="nav"></nav>
<div id="pg"></div>
</div>
<div class="tt" id="tt"></div>

<script>
// ============================================================
// SUPABASE CONFIG — Replace these with your project values
// ============================================================
const SUPABASE_URL = 'https://zsoqttxqancyrjpevssh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_hjmuGRBZw4eK35464rJQcg__fa3B4wi';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STATE
// ============================================================
let players=[], fixtures=[], league=[], kittyLog=[];
let pg='league', sp=null, st='overview';
const TABS=['league','squad','results','add','kitty'];
const TNAME={league:'League',squad:'Squad',results:'Results',add:'Add Week',kitty:'Kitty'};
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const toast=m=>{const t=$('#tt');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2500)};

// ============================================================
// DATA LOADING
// ============================================================
async function loadAll(){
  const [pRes,fRes,lRes,kRes] = await Promise.all([
    sb.from('players').select('*').order('legs_won',{ascending:false}),
    sb.from('fixtures').select('*').order('id',{ascending:true}),
    sb.from('league_table').select('*').order('rank',{ascending:true}),
    sb.from('kitty').select('*').order('id',{ascending:true})
  ]);
  players=pRes.data||[];
  fixtures=fRes.data||[];
  league=lRes.data||[];
  kittyLog=kRes.data||[];
  updateHeader();
  R();
}

function updateHeader(){
  const w=league.find(t=>t.team==='St Ives Warriors');
  if(w) $('#hdrSummary').innerHTML=`Currently <strong>${w.rank}${nth(w.rank)}</strong> · P${w.played} · <span style="color:var(--grn)">${w.won}W</span> <span style="color:var(--red)">${w.lost}L</span> · ${w.legs_for} legs for`;
}
function nth(n){const s=['th','st','nd','rd'];const v=n%100;return s[(v-20)%10]||s[v]||s[0]}

// ============================================================
// NAV & ROUTING
// ============================================================
function rNav(){$('#nav').innerHTML=TABS.map(t=>`<button class="${pg===t?'active':''}" data-p="${t}">${TNAME[t]}</button>`).join('');$$('#nav button').forEach(b=>b.onclick=()=>{pg=b.dataset.p;sp=null;st='overview';rNav();R()})}
function R(){const c=$('#pg');switch(pg){case'league':c.innerHTML=rL();break;case'squad':c.innerHTML=sp?rP():rS();break;case'results':c.innerHTML=rR();break;case'add':c.innerHTML=rA();break;case'kitty':c.innerHTML=rK();break}bindAll()}

// ============================================================
// LEAGUE TABLE
// ============================================================
function rL(){
if(!league.length)return'<div class="pg"><div class="card"><p style="color:var(--td)">Loading league data...</p></div></div>';
const rows=league.map((t,i)=>{const w=t.team==='St Ives Warriors';const fm=(t.form||'').split(',').map(f=>`<span class="fd f${f.toLowerCase()}">${f}</span>`).join('');
return`<tr class="${w?'hw':''}"><td class="pc ${i<3?'p'+(i+1):''}">${t.rank}</td><td><span class="tn ${w?'hl':''}">${t.team}</span></td><td class="c">${t.played}</td><td class="c sw">${t.won}</td><td class="c sl">${t.lost}</td><td class="c">${t.legs_for}</td><td class="c">${(t.win_pct*100).toFixed(0)}%</td><td class="c">${fm}</td></tr>`}).join('');
return`<div class="pg">
<div class="card"><div class="ct"><span class="i">🏆</span>C Section Standings</div><div class="tw"><table><thead><tr><th>#</th><th>Team</th><th class="c">P</th><th class="c">W</th><th class="c">L</th><th class="c">For</th><th class="c">Win%</th><th class="c">Form</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`}

// ============================================================
// SQUAD
// ============================================================
function rS(){
const sorted=[...players].sort((a,b)=>b.legs_won-a.legs_won);
const tLW=players.reduce((s,p)=>s+p.legs_won,0),tLP=players.reduce((s,p)=>s+p.legs_played,0);
const tabs=`<div class="sub-t">${['overview','triples','doubles','singles','scoring'].map(t=>`<button class="${st===t?'act':''}" data-st="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}</div>`;
let tbl='';
if(st==='overview'){
tbl=sorted.map((p,i)=>{const wp=p.legs_played?(p.legs_won/p.legs_played*100).toFixed(0):0;return`<tr><td class="pc ${i<3?'p'+(i+1):''}">${i+1}</td><td><span class="ck" data-pl="${p.name}">${p.full_name}</span></td><td class="c">${p.legs_played}</td><td class="c sg">${p.legs_won}</td><td class="c">${wp}%</td><td class="c">${p.high_out||'—'}</td></tr>`}).join('');
tbl=`<table><thead><tr><th>#</th><th>Player</th><th class="c">Legs P</th><th class="c">Legs W</th><th class="c">Win%</th><th class="c">Best CO</th></tr></thead><tbody>${tbl}</tbody></table>`;
}else if(st==='triples'){
const s=[...players].filter(p=>p.tri_gp).sort((a,b)=>(b.tri_w/b.tri_gp)-(a.tri_w/a.tri_gp));
tbl=`<table><thead><tr><th>Player</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.name}">${p.full_name}</span></td><td class="c sw">${p.tri_w}</td><td class="c sl">${p.tri_l}</td><td class="c">${p.tri_gp}</td><td class="c">${(p.tri_w/p.tri_gp*100).toFixed(0)}%</td></tr>`).join('')}</tbody></table>`;
}else if(st==='doubles'){
const s=[...players].filter(p=>p.dbl_gp).sort((a,b)=>(b.dbl_w/b.dbl_gp)-(a.dbl_w/a.dbl_gp));
tbl=`<table><thead><tr><th>Player</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.name}">${p.full_name}</span></td><td class="c sw">${p.dbl_w}</td><td class="c sl">${p.dbl_l}</td><td class="c">${p.dbl_gp}</td><td class="c">${(p.dbl_w/p.dbl_gp*100).toFixed(0)}%</td></tr>`).join('')}</tbody></table>`;
}else if(st==='singles'){
const s=[...players].filter(p=>p.sin_gp).sort((a,b)=>b.sin_w-a.sin_w);
tbl=`<table><thead><tr><th>Player</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.name}">${p.full_name}</span></td><td class="c sw">${p.sin_w}</td><td class="c sl">${p.sin_l}</td><td class="c">${p.sin_gp}</td><td class="c">${(p.sin_w/p.sin_gp*100).toFixed(0)}%</td></tr>`).join('')}</tbody></table>`;
}else{
const s=[...players].sort((a,b)=>b.scores_100-a.scores_100);
tbl=`<table><thead><tr><th>Player</th><th class="c">100+</th><th class="c">140+</th><th class="c">180</th><th class="c">Best CO</th><th class="c">Worst</th></tr></thead><tbody>${s.map(p=>`<tr><td><span class="ck" data-pl="${p.name}">${p.full_name}</span></td><td class="c">${p.scores_100}</td><td class="c" style="color:var(--ora)">${p.scores_140}</td><td class="c" style="color:var(--red)">${p.scores_180||'—'}</td><td class="c">${p.high_out||'—'}</td><td class="c" style="color:var(--tf)">${p.low_score||'—'}</td></tr>`).join('')}</tbody></table>`}
return`<div class="pg"><div class="card"><div class="ct"><span class="i">⚔️</span>Warriors Squad — Full Season</div>
<div class="stg"><div class="stb"><div class="v">${players.length}</div><div class="l">Players</div></div><div class="stb"><div class="v">${tLW}</div><div class="l">Legs Won</div></div><div class="stb"><div class="v">${tLP}</div><div class="l">Legs Played</div></div><div class="stb"><div class="v">${tLP?(tLW/tLP*100).toFixed(0):0}%</div><div class="l">Win Rate</div></div></div>
${tabs}<div class="tw">${tbl}</div></div></div>`}

// ============================================================
// PLAYER PROFILE
// ============================================================
function rP(){
const p=players.find(x=>x.name===sp);if(!p)return'<div class="pg"><p>Not found</p></div>';
const init=p.full_name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const all=[...players].sort((a,b)=>b.legs_won-a.legs_won);const rank=all.findIndex(x=>x.name===p.name)+1;
const tW=p.tri_w+p.dbl_w+p.sin_w,tG=p.tri_gp+p.dbl_gp+p.sin_gp,wp=p.legs_played?(p.legs_won/p.legs_played*100).toFixed(0):0;
return`<div class="pg">
<button class="btn bo bs" id="bk" style="margin-bottom:12px">← Squad</button>
<div class="card"><div class="ph"><div class="av">${init}</div><div><div class="pn">${p.full_name}</div><div style="color:var(--td);font-size:.8rem">Squad Rank #${rank} · St Ives Warriors</div></div></div>
<div class="stg">
<div class="stb"><div class="v">${p.legs_won}</div><div class="l">Legs Won</div></div>
<div class="stb"><div class="v">${wp}%</div><div class="l">Win Rate</div></div>
<div class="stb"><div class="v">${p.high_out||'—'}</div><div class="l">Best CO</div></div>
<div class="stb"><div class="v">${p.scores_100}</div><div class="l">100+</div></div>
<div class="stb"><div class="v">${p.scores_140}</div><div class="l">140+</div></div>
<div class="stb"><div class="v">${p.legs_played}</div><div class="l">Legs Played</div></div></div>
<div class="ct" style="margin-top:8px"><span class="i">📊</span>Format Breakdown</div>
<div class="tw"><table><thead><tr><th>Format</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th><th></th></tr></thead><tbody>
<tr><td>Triples</td><td class="c sw">${p.tri_w}</td><td class="c sl">${p.tri_l}</td><td class="c">${p.tri_gp}</td><td class="c">${p.tri_gp?(p.tri_w/p.tri_gp*100).toFixed(0)+'%':'—'}</td><td><div class="bar" style="width:80px"><div class="bar-f" style="width:${p.tri_gp?(p.tri_w/p.tri_gp*100):0}%"></div></div></td></tr>
<tr><td>Doubles</td><td class="c sw">${p.dbl_w}</td><td class="c sl">${p.dbl_l}</td><td class="c">${p.dbl_gp}</td><td class="c">${p.dbl_gp?(p.dbl_w/p.dbl_gp*100).toFixed(0)+'%':'—'}</td><td><div class="bar" style="width:80px"><div class="bar-f" style="width:${p.dbl_gp?(p.dbl_w/p.dbl_gp*100):0}%"></div></div></td></tr>
<tr><td>Singles</td><td class="c sw">${p.sin_w}</td><td class="c sl">${p.sin_l}</td><td class="c">${p.sin_gp}</td><td class="c">${p.sin_gp?(p.sin_w/p.sin_gp*100).toFixed(0)+'%':'—'}</td><td><div class="bar" style="width:80px"><div class="bar-f" style="width:${p.sin_gp?(p.sin_w/p.sin_gp*100):0}%"></div></div></td></tr>
<tr style="border-top:2px solid var(--tf)"><td style="font-weight:700">Total</td><td class="c sw" style="font-weight:700">${tW}</td><td class="c sl" style="font-weight:700">${tG-tW}</td><td class="c" style="font-weight:700">${tG}</td><td class="c sg">${tG?(tW/tG*100).toFixed(0)+'%':'—'}</td><td></td></tr>
</tbody></table></div></div></div>`}

const pts=f.score.split('-');const hw=parseInt(pts[0])>parseInt(pts[1]);

return`<div class="pg"><div class="card"><div class="ct"><span class="i">📋</span>All Results</div>

</div>

async function saveWeek(){
  const date=$('#aw-date').value.trim();
  const opp=$('#aw-opp').value.trim();
  const venue=$('#aw-venue').value;
  const score=$('#aw-score').value.trim();
  const isWin=$('#aw-win').value==='true';
  
  if(!date||!opp||!score){toast('Fill in date, opponent and score');return}

  // Save fixture
  const{error:fErr}=await sb.from('fixtures').insert({match_date:date,opponent:opp,venue,score,is_win:isWin,is_cup:false});
  if(fErr){toast('Error saving fixture: '+fErr.message);return}

  // Update each player's cumulative stats
  const rows=$$('.player-row[data-pn]');
  for(const row of rows){
    const pn=row.dataset.pn;
    const v=sel=>parseInt(row.querySelector(sel)?.value)||0;
    const tw=v('.pw-tw'),tl=v('.pw-tl'),tg=v('.pw-tg');
    const dw=v('.pw-dw'),dl=v('.pw-dl'),dg=v('.pw-dg');
    const sw=v('.pw-sw'),sl=v('.pw-sl'),sg=v('.pw-sg');
    const ho=parseInt(row.querySelector('.pw-ho')?.value)||null;
    const lo=parseInt(row.querySelector('.pw-lo')?.value)||null;
    const s100=v('.pw-100'),s140=v('.pw-140');
    
    // Skip players with no activity
    const totalGP=tg+dg+sg;
    if(totalGP===0 && s100===0 && s140===0) continue;
    
    const legsP=tg+dg+sg; // legs played = total games played across formats this week
    // For legs won: each W in triples/doubles/singles counts as legs contributed
    // But the spreadsheet tracks legs_played and legs_won differently... 
    // We'll approximate: legs_won = sum of all W across formats
    const legsW=tw+dw+sw;

    const p=players.find(x=>x.name===pn);
    if(!p)continue;

    const updates={
      tri_w: p.tri_w+tw, tri_l: p.tri_l+tl, tri_gp: p.tri_gp+tg,
      dbl_w: p.dbl_w+dw, dbl_l: p.dbl_l+dl, dbl_gp: p.dbl_gp+dg,
      sin_w: p.sin_w+sw, sin_l: p.sin_l+sl, sin_gp: p.sin_gp+sg,
      scores_100: p.scores_100+s100, scores_140: p.scores_140+s140,
      legs_played: p.legs_played+legsP, legs_won: p.legs_won+legsW
    };
    
    // Update high_out if new one is higher
    if(ho && (!p.high_out || ho > p.high_out)) updates.high_out=ho;
    // Update low_score if new one is lower (or first one)
    if(lo && (!p.low_score || lo < p.low_score)) updates.low_score=lo;

    const{error}=await sb.from('players').update(updates).eq('name',pn);
    if(error) console.error('Error updating '+pn, error);
  }

  toast('Week saved! Stats updated.');
  await loadAll();
  pg='results';rNav();R();
}

// ============================================================
// EVENT BINDING
// ============================================================
let ktype='subs';
function bindAll(){
  $$('.ck[data-pl]').forEach(e=>e.onclick=()=>{sp=e.dataset.pl;R()});
  const bk=$('#bk');if(bk)bk.onclick=()=>{sp=null;R()};
  $$('.sub-t button').forEach(b=>b.onclick=()=>{st=b.dataset.st;R()});
  
  // Add week
  const sw=$('#saveWeek');if(sw)sw.onclick=saveWeek;
  
  // Kitty
  $$('.kt-type').forEach(b=>{b.onclick=()=>{ktype=b.dataset.kt;$$('.kt-type').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  if(ktype==='subs')$('#ktAmt').value='16.00';else if(ktype==='fines')$('#ktAmt').value='1.00';else $('#ktAmt').value='3.00'}});
  const ka=$('#ktAdd');if(ka)ka.onclick=async()=>{
    const amt=parseFloat($('#ktAmt').value)||0;
    const note=$('#ktNote').value.trim();
    if(!amt){toast('Enter an amount');return}
    const{error}=await sb.from('kitty').insert({type:ktype,amount:amt,note});
    if(error){toast('Error: '+error.message);return}
    toast(`£${amt.toFixed(2)} ${ktype} added`);
    await loadAll();
  };
}
