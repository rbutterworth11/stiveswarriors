<style>

body{font-family:'Source Serif 4',serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased}

.hdr{text-align:center;padding:28px 16px 20px}.hdr-badge{display:inline-flex;align-items:center;gap:8px;background:var(--wr);padding:6px 18px;border-radius:30px;margin-bottom:10px}.hdr-badge span{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.9)}
.hdr h1{font-family:'Oswald',sans-serif;font-size:clamp(2.2rem,7vw,3.6rem);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t);line-height:1}.hdr .sub{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--td);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.hdr .pb{display:inline-block;margin-top:12px;background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:5px 16px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--td)}.hdr .pb strong{color:var(--gold)}
.nav{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r);padding:3px;margin:14px 0 20px;border:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav button{flex:1;min-width:max-content;padding:9px 14px;background:0;border:0;border-radius:calc(var(--r) - 2px);font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--td);cursor:pointer;transition:all .2s;white-space:nowrap}.nav button:hover{color:var(--t);background:var(--bg3)}.nav button.active{color:#fff;background:var(--wr)}

.nm{background:linear-gradient(135deg,var(--wrd) 0%,var(--wr) 100%);border-radius:var(--r);padding:18px;margin-bottom:14px;text-align:center;border:1px solid rgba(255,255,255,.08)}.nm .lb{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.6);margin-bottom:6px}.nm .tm{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;text-transform:uppercase}.nm .dt{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.5);margin-top:4px}
.uz{border:2px dashed var(--tf);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;transition:all .3s}.uz:hover,.uz.dg{border-color:var(--gold);background:rgba(212,175,55,.03)}.uz .iu{font-size:2.2rem;margin-bottom:10px}.uz p{color:var(--td);font-size:.85rem}.uz .hn{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--tf);margin-top:6px}.uz img{max-width:100%;max-height:280px;border-radius:var(--rs);margin-top:12px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:0;border-radius:var(--rs);font-family:'Oswald',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.br{background:var(--wr);color:#fff}.br:hover{background:#d6223f;transform:translateY(-1px)}.br:disabled{opacity:.4;cursor:not-allowed;transform:none}
.bo{background:0;border:1px solid var(--tf);color:var(--t)}.bo:hover{border-color:var(--td);background:var(--bg3)}
.bs{padding:5px 12px;font-size:.7rem}
.fg{margin-bottom:14px}.fg label{display:block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg4);border:1px solid var(--tf);border-radius:var(--rs);padding:8px 12px;color:var(--t);font-family:'Source Serif 4',serif;font-size:.85rem}.fg input:focus,.fg select:focus,.fg textarea:focus{outline:0;border-color:var(--bdf)}
select option{background:var(--bg2)}
.ec{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px}.ec h4{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:8px}
.er{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap}.er:last-child{border-bottom:0}.er input,.er select{background:var(--bg4);border:1px solid var(--tf);border-radius:var(--rs);padding:5px 8px;color:var(--t);font-family:'Source Serif 4',serif;font-size:.8rem;flex:1;min-width:50px}
.sts{padding:10px 14px;border-radius:var(--rs);font-size:.8rem;margin-bottom:14px;display:flex;align-items:center;gap:6px}.sts.ok{background:rgba(74,222,128,.08);border:1px solid var(--grn);color:var(--grn)}.sts.inf{background:rgba(96,165,250,.08);border:1px solid var(--blu);color:var(--blu)}
.spn{display:inline-block;width:18px;height:18px;border:2px solid var(--tf);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.dv{height:1px;background:var(--bd);margin:14px 0}.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.pg{animation:fu .3s ease}@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ck{cursor:pointer;transition:color .2s}.ck:hover{color:var(--gold)}
.tt{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--bg2);border:1px solid var(--gold);color:var(--t);padding:10px 22px;border-radius:var(--r);font-size:.8rem;z-index:100;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none}.tt.sh{transform:translateX(-50%) translateY(0)}
.em{text-align:center;padding:40px 16px;color:var(--td)}.em .ei{font-size:2.5rem;margin-bottom:10px;opacity:.4}
.fr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.85rem}.fr:last-child{border-bottom:0}.fa{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ora)}
.pt{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:var(--gold)}
.sub-t{display:flex;gap:16px;margin-bottom:14px;border-bottom:1px solid var(--tf);padding-bottom:8px}.sub-t button{background:0;border:0;font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--td);cursor:pointer;padding-bottom:4px;border-bottom:2px solid transparent;transition:all .2s}.sub-t button:hover{color:var(--t)}.sub-t button.act{color:var(--gold);border-bottom-color:var(--gold)}
.bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:3px}.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
@media(max-width:600px){.app{padding:6px}.card{padding:12px}table{font-size:.7rem}th,td{padding:5px 6px}.stg{grid-template-columns:repeat(2,1fr)}.fc{gap:6px;padding:10px}}
</style>

let pg='league',sp=null,stab='overview';

{n:'Adi',full:'Andy Butterworth',tw:0,tl:4,tg:4,dw:10,dl:4,dg:14,sw:8,sl:6,sg:14,ho:80,lo:7,s1:22,s14:3,s18:0,lp:51,lw:30,wp:.588},

{n:'Callum',full:'Callum Moran',tw:4,tl:3,tg:6,dw:6,dl:9,dg:15,sw:6,sl:5,sg:11,ho:78,lo:null,s1:15,s14:4,s18:0,lp:44,lw:21,wp:.477},

{n:'Dan',full:'Dan Hope',tw:5,tl:2,tg:7,dw:5,dl:5,dg:8,sw:4,sl:6,sg:10,ho:83,lo:null,s1:12,s14:4,s18:0,lp:36,lw:17,wp:.472},
{n:'Steve S',full:'Steve Stewart',tw:2,tl:1,tg:3,dw:4,dl:3,dg:7,sw:7,sl:5,sg:12,ho:90,lo:7,s1:13,s14:0,s18:0,lp:29,lw:16,wp:.552},

{n:'Dave S',full:'David Slater',tw:0,tl:1,tg:1,dw:0,dl:1,dg:1,sw:0,sl:0,sg:0,ho:4,lo:null,s1:1,s14:0,s18:0,lp:4,lw:1,wp:.25}];

const FX=[
{d:'01 Sep',opp:'CSSC B',v:'H',r:'5-6',w:false},

const SK='siw_v3';

function rNav(){$('#nav').innerHTML=TABS.map(t=>`<button class="${pg===t?'active':''}" data-p="${t}">${NAMES[t]}</button>`).join('');$$('#nav button').forEach(b=>b.onclick=()=>{pg=b.dataset.p;sp=null;stab='overview';rNav();rPg()})}

function rPg(){const c=$('#pg');
switch(pg){
case'league':c.innerHTML=rLeague();break;
case'squad':c.innerHTML=sp?rPlayer():rSquad();break;
case'results':c.innerHTML=rResults();break;
case'upload':c.innerHTML=rUpload();break;
case'settings':c.innerHTML=rSettings();break;}
bind()}

// ========= LEAGUE =========
function rLeague(){
const rows=LT.map((t,i)=>{const w=t.t==='St Ives Warriors';const fm=t.fm.map(f=>`<span class="fd f${f.toLowerCase()}">${f}</span>`).join('');
return `<tr class="${w?'hw':''}"><td class="pc ${i<3?'p'+(i+1):''}">${t.r}</td><td><span class="tn ${w?'hl':''}">${t.t}</span></td><td class="c">${t.p}</td><td class="c sw">${t.w}</td><td class="c sl">${t.l}</td><td class="c">${t.f}</td><td class="c">${(t.pc*100).toFixed(0)}%</td><td class="c">${fm}</td></tr>`}).join('');
return `<div class="pg">
<div class="nm"><div class="lb">Next Match</div><div class="tm">Warriors vs ${NXT.a}</div><div class="dt">${NXT.d} · 8:00 PM · Home</div></div>
<div class="card"><div class="ct"><span class="i">🏆</span>C Section Standings</div><div class="tw"><table><thead><tr><th>#</th><th>Team</th><th class="c">P</th><th class="c">W</th><th class="c">L</th><th class="c">For</th><th class="c">Win%</th><th class="c">Form</th></tr></thead><tbody>${rows}</tbody></table></div></div>
</div>`}

// ========= SQUAD =========
function rSquad(){
const sorted=[...SQ].sort((a,b)=>b.lw-a.lw);
const totLW=SQ.reduce((s,p)=>s+p.lw,0);
const totLP=SQ.reduce((s,p)=>s+p.lp,0);

const tabs=`<div class="sub-t"><button class="${stab==='overview'?'act':''}" data-st="overview">Overview</button><button class="${stab==='triples'?'act':''}" data-st="triples">Triples</button><button class="${stab==='doubles'?'act':''}" data-st="doubles">Doubles</button><button class="${stab==='singles'?'act':''}" data-st="singles">Singles</button><button class="${stab==='scoring'?'act':''}" data-st="scoring">Scoring</button></div>`;

let tbl='';
if(stab==='overview'){
tbl=`<table><thead><tr><th>#</th><th>Player</th><th class="c">Legs P</th><th class="c">Legs W</th><th class="c">Win%</th><th class="c">Best CO</th></tr></thead><tbody>${sorted.map((p,i)=>`<tr><td class="pc ${i<3?'p'+(i+1):''}">${i+1}</td><td><span class="ck" data-pl="${p.n}">${p.full}</span></td><td class="c">${p.lp}</td><td class="c sg">${p.lw}</td><td class="c">${(p.wp*100).toFixed(0)}%</td><td class="c">${p.ho||'—'}</td></tr>`).join('')}</tbody></table>`;
}else if(stab==='triples'){
const s=[...SQ].sort((a,b)=>(b.tg?b.tw/b.tg:0)-(a.tg?a.tw/a.tg:0));
tbl=`<table><thead><tr><th>Player</th><th class="c">W</th><th class="c">L</th><th class="c">GP</th><th class="c">Win%</th></tr></thead><tbody>${s.filter(p=>p.tg).map(p=>`<tr><td><span class="ck" data-pl="${p.n}">${p.full}</span></td><td class="c sw">${p.tw}</td><td class="c sl">${p.tl}</td><td class="c">${p.tg}</td><td class="c">${p.tg?(p.tw/p.tg*100).toFixed(0)+'%':'—'}</td></tr>`).join('')}</tbody></table>`;
}else if(stab==='doubles'){

}

return `<div class="pg"><div class="card">

<div class="stg">
<div class="stb"><div class="v">${SQ.length}</div><div class="l">Players</div></div>

// ========= AI EXTRACTION =========
async function xPhoto(b64,mime){
if(!D.apiKey){toast('Set API key first');return null}
const pls=SQ.map(p=>p.n).join(', ');
const sys=`Extract darts match data from this handwritten scoresheet for St Ives Warriors. RESPOND ONLY IN JSON:
{"date":"YYYY-MM-DD","opponent":"team name","venue":"Home|Away","result":"X-Y W|L",
"players":[{"name":"short name","triples_w":0,"triples_l":0,"triples_gp":0,"doubles_w":0,"doubles_l":0,"doubles_gp":0,"singles_w":0,"singles_l":0,"singles_gp":0,"highest_out":0,"lowest_score":0,"scores_100":0,"scores_140":0,"scores_180":0,"legs_played":0,"legs_won":0}]}
Known players: ${pls}. Match names to known players.`;
try{
const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':D.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Extract all data from this darts scoresheet.'}]}]})});
const data=await r.json();if(data.error)throw new Error(data.error.message);
const txt=data.content.map(c=>c.text||'').join('');return JSON.parse(txt.replace(/```json|```/g,'').trim());
}catch(e){toast('Error: '+e.message);return null}}

async function handleFile(f){
const prev=$('#up'),zone=$('#uz');
const reader=new FileReader();
reader.onload=async e=>{
const url=e.target.result,b64=url.split(',')[1],mime=f.type||'image/jpeg';
prev.classList.remove('hidden');prev.innerHTML=`<img src="${url}" style="max-width:100%;border-radius:var(--rs)">`;
zone.innerHTML=`<div class="spn"></div><p style="margin-top:10px;color:var(--gold)">Analysing scoresheet...</p>`;
const result=await xPhoto(b64,mime);
zone.innerHTML=`<div class="iu">📷</div><p>Drop a photo or tap to select</p><div class="hn">JPG, PNG</div><input type="file" accept="image/*" capture="environment" id="fi" style="display:none">`;
bind();
if(result){$('#xr').classList.remove('hidden');$('#xr').innerHTML=`<div class="sts ok">Extracted! Review the data below.</div><pre style="background:var(--bg3);padding:12px;border-radius:var(--rs);font-size:.75rem;overflow-x:auto;color:var(--td);white-space:pre-wrap">${JSON.stringify(result,null,2)}</pre><p style="color:var(--td);font-size:.8rem;margin-top:10px">Copy this data to update your spreadsheet, or use it to add the week's stats.</p>`}
};reader.readAsDataURL(f)}

// ========= BIND =========
function bind(){
$$('.ck[data-pl]').forEach(e=>e.onclick=()=>{sp=e.dataset.pl;rPg()});
const bk=$('#bk');if(bk)bk.onclick=()=>{sp=null;rPg()};
$$('.sub-t button').forEach(b=>b.onclick=()=>{stab=b.dataset.st;rPg()});
const zone=$('#uz'),fi=$('#fi');
if(zone&&fi){zone.onclick=()=>fi.click();zone.ondragover=e=>{e.preventDefault();zone.classList.add('dg')};zone.ondragleave=()=>zone.classList.remove('dg');zone.ondrop=e=>{e.preventDefault();zone.classList.remove('dg');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])};fi.onchange=()=>{if(fi.files.length)handleFile(fi.files[0])}}
const sak=$('#sak');if(sak)sak.onclick=()=>{D.apiKey=$('#ak').value.trim();sv(D);toast('API key saved')}}

rNav();rPg();
</script>
